<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Forestry Pro AI - Ultra Edition</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Chakra Petch', sans-serif; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; color: #e2e8f0; }
        #video-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }
        video { position: absolute; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); z-index: 1; }
        
        /* Instruction Banner */
        #instruction-banner { background: rgba(0, 255, 157, 0.9); color: #0f172a; padding: 12px; text-align: center; font-weight: 700; font-size: 14px; position: relative; z-index: 20; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Targeting System */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 100px; height: 100px; transform: translate(-50%, -50%); pointer-events: none; z-index: 5; display: flex; align-items: center; justify-content: center; }
        .aim-ring { width: 40px; height: 40px; border: 1px solid rgba(0, 255, 157, 0.4); border-radius: 50%; position: absolute; }
        .aim-ring::before { content: ''; position: absolute; inset: -8px; border: 1px solid transparent; border-top-color: #00ff9d; border-bottom-color: #00ff9d; border-radius: 50%; animation: spin 6s linear infinite; }
        .center-dot { width: 4px; height: 4px; background: #ef4444; border-radius: 50%; box-shadow: 0 0 8px #ef4444; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* UI Overlay */
        #ui-layer { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; pointer-events: none; }
        #ui-layer > * { pointer-events: auto; }

        .hud { padding: 12px; background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; margin: 8px; }
        #top-hud { display: grid; grid-template-columns: 1.2fr 1fr 40px; gap: 10px; align-items: center; }
        .sensor-label { font-size: 9px; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; font-weight: 600; }
        .sensor-value { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; color: #00ff9d; }
        input { padding: 6px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 10px; width: 100%; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 16px; outline: none; }
        .btn-torch { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); height: 40px; width: 40px; border-radius: 12px; color: #fbbf24; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .btn-torch.active { background: #ffcc00; color: #000; }

        #result-hud { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; text-align: center; margin-top: auto; }
        .res-card { padding: 10px; border-radius: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
        .res-num { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 800; margin-top: 2px; color: #f8fafc; }
        
        #controls { padding: 4px 12px 24px 12px; display: flex; flex-direction: column; gap: 8px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 8px; color: #fff; border: none; padding: 16px; font-size: 14px; font-weight: 700; border-radius: 16px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); -webkit-tap-highlight-color: transparent; }
        .btn-sensor { background: #334155; grid-column: span 2; }
        .btn-base { background: #2563eb; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .btn-top { background: #059669; box-shadow: 0 4px 12px rgba(5, 150, 105, 0.3); }
        .btn-side { background: #7c3aed; box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3); }
        .btn-reset { background: #475569; font-size: 12px; padding: 12px; }
        .btn-export { background: #f97316; font-size: 12px; padding: 12px; }
        
        .btn:active { transform: scale(0.94); filter: brightness(1.1); }
        .active-step { outline: 2px solid #fff; outline-offset: 2px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        #history-panel { height: 90px; overflow-y: auto; background: rgba(0,0,0,0.5); margin: 0 12px 10px 12px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); padding: 10px; font-size: 11px; scrollbar-width: none; }
        #history-panel::-webkit-scrollbar { display: none; }
        .history-item { display: grid; grid-template-columns: 30px 1fr 1fr 1fr; gap: 4px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); color: #cbd5e1; }
        .disabled { opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>
<div id="instruction-banner">กรุณากดปุ่ม 1 เพื่อเริ่มระบบเซนเซอร์</div>
<div id="video-container">
    <video id="webcam" autoplay playsinline></video>
    <div id="crosshair">
        <div class="aim-ring"></div>
        <div class="center-dot"></div>
    </div>
    
    <div id="ui-layer">
        <div id="top-hud" class="hud">
            <div class="sensor-box">
                <span class="sensor-label">Tilt / Yaw</span><br>
                <span class="sensor-value"><span id="live-tilt">0.0</span>° / <span id="live-yaw">0.0</span>°</span>
            </div>
            <div class="input-box">
                <span class="sensor-label">Eye H. (m)</span>
                <input type="number" id="eye-height" value="1.60" step="0.01">
            </div>
            <button class="btn-torch" id="btn-torch">🔦</button>
        </div>

        <div id="result-hud" class="hud">
            <div class="res-card" style="border-color: #3b82f6;">
                <span class="sensor-label">Distance (m)</span>
                <div class="res-num" style="color: #3b82f6;" id="val-d">--</div>
            </div>
            <div class="res-card" style="border-color: #00ff9d;">
                <span class="sensor-label">Height (m)</span>
                <div class="res-num" style="color: #00ff9d;" id="val-height">--</div>
            </div>
            <div class="res-card" style="border-color: #a78bfa; grid-column: span 2;">
                <span class="sensor-label">Girth (cm)</span>
                <div class="res-num" style="color: #a78bfa;" id="val-girth">--</div>
            </div>
        </div>

        <div id="history-panel">
            <div style="color:#9ca3af; text-align:center; margin-bottom:5px; font-size:10px; letter-spacing:1px;">HISTORY LOG</div>
            <div id="log-container"></div>
        </div>

        <div id="controls">
            <button class="btn btn-sensor" id="btn-request">🛰️ 1. Start Sensors</button>
            <div class="btn-group">
                <button class="btn btn-base disabled" id="btn-base">📐 2. Lock Base</button>
                <button class="btn btn-top disabled" id="btn-top">🌲 3. Lock Top</button>
            </div>
            <div class="btn-group">
                <button class="btn btn-side disabled" id="btn-left">⬅️ 4. Left Edge</button>
                <button class="btn btn-side disabled" id="btn-right">➡️ 5. Right Edge</button>
            </div>
            <div class="btn-group">
                <button class="btn btn-reset" id="btn-reset">🗑️ Reset</button>
                <button class="btn btn-export" id="btn-export">📥 Export CSV</button>
            </div>
        </div>
    </div>
</div>
<script>
    const video = document.getElementById('webcam');
    const torchBtn = document.getElementById('btn-torch');
    const logContainer = document.getElementById('log-container');
    const instruction = document.getElementById('instruction-banner');

    let currentTilt = 0, currentYaw = 0, baseAngle = 0, topAngle = 0, distanceD = 0;
    let leftYaw = null, rightYaw = null, videoTrack = null, torchActive = false;
    let measurements = [];

    // Load History on Start
    const saved = localStorage.getItem('forestry_data');
    if(saved) { measurements = JSON.parse(saved); updateLogUI(); }

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } })
        .then(stream => { video.srcObject = stream; videoTrack = stream.getVideoTracks()[0]; })
        .catch(() => {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => { video.srcObject = stream; videoTrack = stream.getVideoTracks()[0]; });
        });

    torchBtn.addEventListener('click', async () => {
        if (!videoTrack) return;
        try {
            const caps = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
            if (caps.torch) {
                torchActive = !torchActive;
                await videoTrack.applyConstraints({ advanced: [{ torch: torchActive }] });
                torchBtn.classList.toggle('active', torchActive);
                triggerVibration(50);
            } else { alert("อุปกรณ์ไม่รองรับการเปิดไฟฉายผ่านเว็บบราวเซอร์"); }
        } catch (err) { console.error(err); }
    });

    document.getElementById('btn-request').addEventListener('click', async () => {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') startSensors();
            } catch (e) { alert("Permission denied"); }
        } else {
            startSensors();
        }
    });

    function startSensors() {
        window.addEventListener('deviceorientation', handleOrientation);
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('disabled'));
        updateStep(2);
        triggerVibration(100);
    }

    function updateStep(step) {
        const info = {
            2: "เล็งที่โคนต้นไม้ (ระดับดิน) แล้วกดปุ่ม 2",
            3: "เล็งที่ยอดไม้ แล้วกดปุ่ม 3",
            4: "เล็งที่ขอบเปลือกไม้ด้านซ้าย แล้วกดปุ่ม 4",
            5: "เล็งที่ขอบเปลือกไม้ด้านขวา แล้วกดปุ่ม 5",
            6: "บันทึกเรียบร้อย! กดปุ่ม 2 เพื่อเริ่มต้นใหม่"
        };
        instruction.innerText = info[step] || "";
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active-step'));
        if (step === 2) document.getElementById('btn-base').classList.add('active-step');
        if (step === 3) document.getElementById('btn-top').classList.add('active-step');
        if (step === 4) document.getElementById('btn-left').classList.add('active-step');
        if (step === 5) document.getElementById('btn-right').classList.add('active-step');
    }

    function handleOrientation(event) {
        let tilt = event.beta - 90; 
        currentTilt = tilt;
        document.getElementById('live-tilt').innerText = tilt.toFixed(1);
        let yaw = event.alpha; 
        currentYaw = yaw;
        document.getElementById('live-yaw').innerText = yaw.toFixed(1);
    }

    function triggerVibration(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

    document.getElementById('btn-base').addEventListener('click', () => {
        triggerVibration(50);
        baseAngle = currentTilt; // Angle to the base
        const eyeHeight = parseFloat(document.getElementById('eye-height').value);
        
        // Formula: Horizontal Distance = EyeHeight / tan(tilt_angle)
        // In portrait vertical=90, tilt down makes it < 90. tilt = currentTilt - 90.
        const angleFromHorizontalRad = Math.abs(baseAngle) * (Math.PI / 180);
        if (angleFromHorizontalRad === 0) return alert("มุมระนาบเกินไป ไม่สามารถคำนวณระยะได้");
        distanceD = eyeHeight / Math.tan(angleFromHorizontalRad);
        document.getElementById('val-d').innerText = distanceD.toFixed(2);
        localStorage.setItem('last_d', distanceD);
        updateStep(3);
    });

    document.getElementById('btn-top').addEventListener('click', () => {
        if (distanceD === 0) return alert("กรุณา Lock Base (ปุ่ม 2) เพื่อหาระยะ D ก่อนคำนวณความสูงครับ");
        triggerVibration(80);
        topAngle = currentTilt;
        const baseRad = baseAngle * (Math.PI / 180);
        const topRad = topAngle * (Math.PI / 180);
        
        // Formula: Total Height = D * (tan(angle_top) - tan(angle_base))
        // Since baseAngle is usually negative (down), tan(top) - tan(-base) = tan(top) + tan(base)
        const totalHeight = distanceD * (Math.tan(topRad) - Math.tan(baseRad));
        document.getElementById('val-height').innerText = totalHeight.toFixed(2);
        updateStep(4);
    });

    document.getElementById('btn-left').addEventListener('click', () => {
        triggerVibration(50);
        leftYaw = currentYaw;
        updateStep(5);
    });

    document.getElementById('btn-right').addEventListener('click', () => {
        if (distanceD === 0 || leftYaw === null) return alert("กรุณา Lock Distance และ Left Edge ก่อนครับ");
        triggerVibration(200);
        rightYaw = currentYaw;

        let diff = Math.abs(leftYaw - rightYaw);
        if (diff > 180) diff = 360 - diff;
        const thetaRad = diff * (Math.PI / 180);

        // Tangential Geometry Formula
        const sinTheta2 = Math.sin(thetaRad / 2);
        const r = (distanceD * sinTheta2) / (1 - sinTheta2);
        const girth_cm = 2 * Math.PI * r * 100; 

        document.getElementById('val-girth').innerText = girth_cm.toFixed(1);
        
        // Save to History
        const record = {
            id: measurements.length + 1,
            dist: distanceD.toFixed(2),
            height: document.getElementById('val-height').innerText || "0.00",
            girth: girth_cm.toFixed(1),
            time: new Date().toLocaleTimeString('th-TH')
        };
        measurements.unshift(record);
        localStorage.setItem('forestry_data', JSON.stringify(measurements));
        updateLogUI();
        updateStep(6);
    });

    function updateLogUI() {
        logContainer.innerHTML = measurements.map(m => `
            <div class="history-item">
                <span style="color:#00ff66; font-weight:bold;">#${m.id}</span>
                <span>H: ${m.height}m</span>
                <span>G: ${m.girth}cm</span>
                <span style="color:#64748b; font-size:10px; text-align:right;">${m.time}</span>
            </div>
        `).join('');
    }

    document.getElementById('btn-export').addEventListener('click', () => {
        if (measurements.length === 0) return alert("ไม่มีข้อมูลให้ส่งออก");
        let csv = "\uFEFFID,Time,Distance(m),Height(m),Girth(cm)\n";
        measurements.forEach(m => csv += `${m.id},${m.time},${m.dist},${m.height},${m.girth}\n`);
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Forestry_Export_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
        if(!confirm("คุณต้องการล้างข้อมูลทั้งหมดใช่หรือไม่?")) return;
        distanceD = 0; leftYaw = null; rightYaw = null;
        measurements = [];
        localStorage.removeItem('forestry_data');
        document.getElementById('val-d').innerText = "--";
        document.getElementById('val-height').innerText = "--";
        document.getElementById('val-girth').innerText = "--";
        updateLogUI();
        triggerVibration(50);
        updateStep(2);
    });
</script>
</body>
</html>
